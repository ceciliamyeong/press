<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>블록미디어 보도자료 아카이브</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', sans-serif; background: #fafaf9; color: #1a1a1a; }

.header {
  padding: 16px 24px;
  border-bottom: 1px solid #e5e5e3;
  background: #fff;
  display: flex;
  align-items: center;
  gap: 12px;
}
.header h1 { font-size: 15px; font-weight: 600; }
.header span { font-size: 13px; color: #888; }

.toolbar {
  display: flex;
  gap: 8px;
  align-items: center;
  padding: 12px 24px;
  background: #fff;
  border-bottom: 1px solid #e5e5e3;
  flex-wrap: wrap;
}

.search-wrap { flex: 1; min-width: 200px; position: relative; }
.search-wrap input {
  width: 100%;
  padding: 7px 12px 7px 32px;
  font-size: 13px;
  border: 1px solid #e5e5e3;
  border-radius: 6px;
  background: #fafaf9;
  color: #1a1a1a;
  outline: none;
}
.search-wrap input:focus { border-color: #aaa; background: #fff; }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #aaa; font-size: 14px; }

select {
  font-size: 13px;
  padding: 6px 10px;
  border: 1px solid #e5e5e3;
  border-radius: 6px;
  background: #fafaf9;
  color: #1a1a1a;
  cursor: pointer;
  outline: none;
}

.view-toggle {
  display: flex;
  border: 1px solid #e5e5e3;
  border-radius: 6px;
  overflow: hidden;
}
.view-toggle button {
  border: none;
  padding: 6px 14px;
  font-size: 12px;
  background: #fafaf9;
  color: #888;
  cursor: pointer;
}
.view-toggle button.active { background: #fff; color: #1a1a1a; font-weight: 500; }

.stats-row {
  display: flex;
  gap: 16px;
  padding: 8px 24px;
  background: #fff;
  border-bottom: 1px solid #e5e5e3;
}
.stat { font-size: 12px; color: #888; }
.stat strong { color: #1a1a1a; font-weight: 500; }

.content { padding: 0 24px 40px; }

table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 1px; }
thead th {
  text-align: left;
  padding: 10px 10px;
  font-size: 11px;
  font-weight: 500;
  color: #888;
  border-bottom: 1px solid #e5e5e3;
  cursor: pointer;
  user-select: none;
  background: #fafaf9;
}
thead th:hover { color: #1a1a1a; }
tbody tr { border-bottom: 1px solid #f0f0ee; cursor: pointer; }
tbody tr:hover { background: #f5f5f3; }
tbody tr.expanded { background: #f5f5f3; }
td { padding: 10px 10px; vertical-align: middle; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.col-date { width: 80px; }
.col-company { width: 120px; }
.col-title { width: auto; }
.col-cat { width: 90px; }
.col-tokens { width: 110px; }
.col-score { width: 70px; text-align: center; }

.cat-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 99px;
  font-size: 11px;
  font-weight: 500;
}
.cat-listing { background: #dbeafe; color: #1e40af; }
.cat-partnership { background: #d1fae5; color: #065f46; }
.cat-funding { background: #fef3c7; color: #92400e; }
.cat-regulation { background: #fee2e2; color: #991b1b; }
.cat-product { background: #ede9fe; color: #5b21b6; }
.cat-event { background: #fce7f3; color: #9d174d; }
.cat-other { background: #f3f4f6; color: #374151; }

.token-tag {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 4px;
  font-size: 11px;
  background: #f3f4f6;
  color: #555;
  border: 1px solid #e5e5e3;
  margin-right: 3px;
}

.score-dots { display: flex; gap: 3px; justify-content: center; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: #e5e5e3; }
.dot.on { background: #10b981; }

.expand-row td { padding: 0; white-space: normal; }
.expand-inner {
  padding: 14px 16px 14px 24px;
  border-left: 2px solid #3b82f6;
  margin: 0 10px 10px 10px;
}
.expand-inner .summary { font-size: 13px; color: #333; line-height: 1.7; margin-bottom: 10px; }
.expand-meta { display: flex; gap: 16px; flex-wrap: wrap; }
.expand-meta span { font-size: 12px; color: #888; }
.expand-meta span strong { color: #333; font-weight: 500; }

.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
  padding-top: 16px;
}
.card {
  background: #fff;
  border: 1px solid #e5e5e3;
  border-radius: 8px;
  padding: 14px 16px;
  cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.card:hover { border-color: #ccc; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.card-company { font-size: 11px; color: #888; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
.card-date { font-size: 11px; color: #aaa; }
.card-title { font-size: 14px; font-weight: 500; color: #1a1a1a; margin-bottom: 8px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-summary { font-size: 12px; color: #666; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 10px; }
.card-footer { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }

.empty { text-align: center; padding: 60px; color: #aaa; font-size: 13px; }
.loading { text-align: center; padding: 60px; color: #aaa; font-size: 13px; }
</style>
</head>
<body>

<div class="header">
  <h1>보도자료 아카이브</h1>
  <span>블록미디어 내부용</span>
</div>

<div class="toolbar">
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="search" placeholder="회사명, 제목, 키워드 검색..." oninput="render()">
  </div>
  <select id="cat-filter" onchange="render()">
    <option value="">전체 카테고리</option>
    <option value="listing">상장</option>
    <option value="partnership">파트너십</option>
    <option value="funding">펀딩</option>
    <option value="regulation">규제</option>
    <option value="product">제품</option>
    <option value="event">이벤트</option>
    <option value="other">기타</option>
  </select>
  <select id="lang-filter" onchange="render()">
    <option value="">전체 언어</option>
    <option value="ko">한국어</option>
    <option value="en">영어</option>
    <option value="mixed">혼합</option>
  </select>
  <select id="score-filter" onchange="render()">
    <option value="">중요도 전체</option>
    <option value="4">4점 이상</option>
    <option value="3">3점 이상</option>
  </select>
  <div class="view-toggle">
    <button class="active" id="btn-table" onclick="setView('table')">테이블</button>
    <button id="btn-card" onclick="setView('card')">카드</button>
  </div>
</div>

<div class="stats-row">
  <div class="stat">총 <strong id="total-count">-</strong>건</div>
  <div class="stat">오늘 <strong id="today-count">-</strong>건</div>
  <div class="stat">이번 주 <strong id="week-count">-</strong>건</div>
</div>

<div class="content">
  <div id="table-view">
    <table>
      <thead>
        <tr>
          <th class="col-date" onclick="sortBy('date')">날짜</th>
          <th class="col-company" onclick="sortBy('company')">회사</th>
          <th class="col-title">제목</th>
          <th class="col-cat">카테고리</th>
          <th class="col-tokens">토큰</th>
          <th class="col-score" onclick="sortBy('score')">중요도</th>
        </tr>
      </thead>
      <tbody id="table-body"><tr><td colspan="6" class="loading">데이터 불러오는 중...</td></tr></tbody>
    </table>
  </div>
  <div id="card-view" style="display:none">
    <div class="card-grid" id="card-grid"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://xiyojjywtcwiymibmszr.supabase.co';
const SUPABASE_KEY = 'sb_publishable_RQGUYA-vTnhk3uT1kr8zlA_zwlDbo8i';

const CAT_LABELS = {
  listing: '상장', partnership: '파트너십', funding: '펀딩',
  regulation: '규제', product: '제품', event: '이벤트', other: '기타'
};

let allData = [];
let sortKey = 'date';
let sortDir = -1;
let currentView = 'table';
let expandedId = null;

async function loadData() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/press_structured?select=*,press_raw(received_at,sender,subject,body_plain)&order=parsed_at.desc&limit=200`,
      { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
    );
    const data = await res.json();
    if (Array.isArray(data)) { allData = data; render(); }
    else { showError(); }
  } catch(e) { showError(); }
}

function showError() {
  document.getElementById('table-body').innerHTML = `<tr><td colspan="6" class="empty">데이터를 불러올 수 없습니다</td></tr>`;
}

function filtered() {
  const q = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('cat-filter').value;
  const lang = document.getElementById('lang-filter').value;
  const score = parseInt(document.getElementById('score-filter').value) || 0;
  return allData.filter(d => {
    const matchQ = !q || (d.title||'').toLowerCase().includes(q) ||
      (d.company||'').toLowerCase().includes(q) ||
      (d.keywords||[]).join(' ').toLowerCase().includes(q);
    return matchQ &&
      (!cat || d.category === cat) &&
      (!lang || d.language === lang) &&
      (!score || (d.importance_score||0) >= score);
  }).sort((a, b) => {
    if (sortKey === 'date') return sortDir * (new Date(b.press_raw?.received_at||b.parsed_at) - new Date(a.press_raw?.received_at||a.parsed_at));
    if (sortKey === 'company') return sortDir * (a.company||'').localeCompare(b.company||'');
    if (sortKey === 'score') return sortDir * ((b.importance_score||0) - (a.importance_score||0));
    return 0;
  });
}

function formatDate(d) {
  if (!d) return '-';
  const dt = new Date(d);
  return `${dt.getMonth()+1}/${dt.getDate()}`;
}

function dots(n) {
  return Array.from({length:5}, (_,i) => `<div class="dot ${i<n?'on':''}"></div>`).join('');
}

function catBadge(cat) {
  return `<span class="cat-badge cat-${cat||'other'}">${CAT_LABELS[cat]||'기타'}</span>`;
}

function tokenTags(tokens) {
  if (!tokens||!tokens.length) return '-';
  return tokens.slice(0,3).map(t => `<span class="token-tag">${t}</span>`).join('');
}

function updateStats(rows) {
  const now = new Date();
  const todayStr = now.toDateString();
  const weekAgo = new Date(now - 7*24*60*60*1000);
  document.getElementById('total-count').textContent = rows.length;
  document.getElementById('today-count').textContent = rows.filter(d => new Date(d.press_raw?.received_at||d.parsed_at).toDateString()===todayStr).length;
  document.getElementById('week-count').textContent = rows.filter(d => new Date(d.press_raw?.received_at||d.parsed_at)>=weekAgo).length;
}

function render() {
  const rows = filtered();
  updateStats(rows);
  if (currentView === 'table') renderTable(rows);
  else renderCards(rows);
}

function renderTable(rows) {
  const tbody = document.getElementById('table-body');
  if (!rows.length) { tbody.innerHTML = `<tr><td colspan="6" class="empty">검색 결과가 없습니다</td></tr>`; return; }
  tbody.innerHTML = rows.map(d => {
    const isExp = expandedId === d.id;
    return `
      <tr onclick="toggleExpand('${d.id}')" class="${isExp?'expanded':''}">
        <td class="col-date" style="color:#888;font-size:12px">${formatDate(d.press_raw?.received_at||d.parsed_at)}</td>
        <td class="col-company" style="font-weight:500">${d.company||'-'}</td>
        <td class="col-title">${d.title||d.press_raw?.subject||'-'}</td>
        <td class="col-cat">${catBadge(d.category)}</td>
        <td class="col-tokens">${tokenTags(d.tokens)}</td>
        <td class="col-score"><div class="score-dots">${dots(d.importance_score||0)}</div></td>
      </tr>
      ${isExp ? `<tr class="expand-row"><td colspan="6">
        <div class="expand-inner">
          <div class="summary">${d.summary_ko||'요약 없음'}</div>
          <div class="expand-meta">
            <span><strong>발신:</strong> ${d.press_raw?.sender||'-'}</span>
            <span><strong>언어:</strong> ${d.language||'-'}</span>
            <span><strong>키워드:</strong> ${(d.keywords||[]).join(', ')||'-'}</span>
          </div>
        </div>
      </td></tr>` : ''}`;
  }).join('');
}

function renderCards(rows) {
  const grid = document.getElementById('card-grid');
  if (!rows.length) { grid.innerHTML = `<div class="empty">검색 결과가 없습니다</div>`; return; }
  grid.innerHTML = rows.map(d => `
    <div class="card">
      <div class="card-header">
        <span class="card-company">${d.company||'-'}</span>
        <span class="card-date">${formatDate(d.press_raw?.received_at||d.parsed_at)}</span>
      </div>
      <div class="card-title">${d.title||d.press_raw?.subject||'-'}</div>
      <div class="card-summary">${d.summary_ko||'-'}</div>
      <div class="card-footer">${catBadge(d.category)} ${tokenTags(d.tokens)}</div>
    </div>`).join('');
}

function toggleExpand(id) { expandedId = expandedId===id ? null : id; render(); }
function sortBy(key) { if(sortKey===key) sortDir*=-1; else{sortKey=key;sortDir=-1;} render(); }
function setView(v) {
  currentView = v;
  document.getElementById('table-view').style.display = v==='table'?'block':'none';
  document.getElementById('card-view').style.display = v==='card'?'block':'none';
  document.getElementById('btn-table').className = v==='table'?'active':'';
  document.getElementById('btn-card').className = v==='card'?'active':'';
  render();
}

loadData();
</script>
</body>
</html>
